user nginx;

events {}

http {
    include /etc/nginx/mime.types;

    gzip_static on;
    gzip_vary on;

    server {
        listen 3000;
        server_name projectly_frontend;

        root /usr/share/nginx/html;
        index index.html;

        absolute_redirect off;

        location /my/ {
            try_files $uri $uri/ /my/200.html;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
        }
    }
}